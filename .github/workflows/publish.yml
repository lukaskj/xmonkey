name: Publish Package to NPM
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  Publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Get Version From Tag
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publishing Version ${{ steps.get_version.outputs.VERSION }}
        run: |
          echo "Version to publish: ${{ steps.get_version.outputs.VERSION }}"

      - name: Publish to NPM
        run: |
          npm version --allow-same-version --no-git-tag-version ${{ steps.get_version.outputs.VERSION }}
          npm publish --access public --ignore-scripts --no-git-checks

      # - name: Create GitHub Release
      #   uses: softprops/action-gh-release@v2
      #   if: github.ref_type == 'tag'
      #   with:
      #     name: v${{ steps.get_version.outputs.VERSION }}
      #     tag_name: v${{ steps.get_version.outputs.VERSION }}
      #     generate_release_notes: true
